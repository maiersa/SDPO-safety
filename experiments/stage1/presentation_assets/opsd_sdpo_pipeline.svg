<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#eef4f6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#254441"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #16302b; }
      .subtitle { font: 500 20px Arial, sans-serif; fill: #355c57; }
      .boxTitle { font: 700 24px Arial, sans-serif; fill: #16302b; }
      .body { font: 500 20px Arial, sans-serif; fill: #1f2d2a; }
      .small { font: 500 18px Arial, sans-serif; fill: #36504c; }
      .chip { font: 700 18px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="url(#bg)"/>
  <text x="70" y="90" class="title">OPSD/SDPO at an Intermediate Checkpoint</text>
  <text x="70" y="128" class="subtitle">A simple picture of the self-improvement loop you want the audience to remember</text>

  <rect x="70" y="190" rx="28" ry="28" width="270" height="180" fill="#d8ebe5" stroke="#254441" stroke-width="3"/>
  <text x="105" y="245" class="boxTitle">1. Base Checkpoint</text>
  <text x="105" y="287" class="body">Intermediate model</text>
  <text x="105" y="319" class="body">still in pretraining</text>
  <text x="105" y="351" class="small">Example: early or mid-stage policy</text>

  <rect x="410" y="190" rx="28" ry="28" width="270" height="180" fill="#fdecc8" stroke="#6a5131" stroke-width="3"/>
  <text x="445" y="245" class="boxTitle">2. Sample Attempts</text>
  <text x="445" y="287" class="body">Generate multiple</text>
  <text x="445" y="319" class="body">reasoning traces</text>
  <text x="445" y="351" class="small">Good, bad, and partial solutions</text>

  <rect x="750" y="190" rx="28" ry="28" width="270" height="180" fill="#fbd4cc" stroke="#7a3f31" stroke-width="3"/>
  <text x="790" y="245" class="boxTitle">3. Score Outcomes</text>
  <text x="790" y="287" class="body">Verifiable reward</text>
  <text x="790" y="319" class="body">or preference signal</text>
  <text x="790" y="351" class="small">Did the answer succeed?</text>

  <rect x="1090" y="190" rx="28" ry="28" width="240" height="180" fill="#d7e3f5" stroke="#34506b" stroke-width="3"/>
  <text x="1126" y="245" class="boxTitle">4. Update Policy</text>
  <text x="1126" y="287" class="body">Reinforce useful</text>
  <text x="1126" y="319" class="body">behaviors early</text>
  <text x="1126" y="351" class="small">Shift distribution toward success</text>

  <line x1="340" y1="280" x2="410" y2="280" stroke="#254441" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="680" y1="280" x2="750" y2="280" stroke="#254441" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="280" x2="1090" y2="280" stroke="#254441" stroke-width="5" marker-end="url(#arrow)"/>

  <path d="M 1210 375 C 1210 520, 840 590, 540 590 C 320 590, 180 520, 180 435" fill="none" stroke="#254441" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="830" y="560" class="boxTitle">Repeat the loop while the model is still maturing</text>

  <rect x="90" y="470" rx="20" ry="20" width="1220" height="250" fill="#fffdf8" stroke="#c9c1b4" stroke-width="2"/>
  <text x="125" y="525" class="boxTitle">Main intuition</text>
  <text x="125" y="570" class="body">If the model is already capable of producing some useful attempts, OPSD/SDPO may amplify those behaviors</text>
  <text x="125" y="605" class="body">before full pretraining is complete.</text>
  <text x="125" y="655" class="boxTitle">What changes with early use?</text>
  <text x="125" y="695" class="body">The key question becomes where the method turns on: too early gives noisy or useless signals, but after a threshold,</text>
  <text x="125" y="730" class="body">self-generated traces may be good enough to reinforce reasoning structure.</text>

  <rect x="1080" y="90" rx="18" ry="18" width="190" height="52" fill="#254441"/>
  <text x="1114" y="123" class="chip">Why try it early?</text>
</svg>
