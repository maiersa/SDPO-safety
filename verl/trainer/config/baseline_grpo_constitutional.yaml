defaults:
  - ppo_trainer
  - user
  - _self_

# GRPO with Constitutional Judge (Baseten-style)
# On-policy RL with external frontier model judge

max_model_len: 10240

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 8
  rollout:
    n: 4  # Baseten: 4 rollouts per prompt (vs 8 in generic baseline)
    calculate_log_probs: True

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: False
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

data:
  train_batch_size: 32

# Custom reward function: external judge scoring
custom_reward_function:
  path: ${vars.dir}/verl/utils/reward_score/feedback/constitution_judge.py

# Constitutional judge configuration
trainer:
  project_name: GRPO-Constitutional-${oc.env:USER}
  group_name: grpo_constitutional
